# ──────────────────────────────────────────────
# Hyprland Config - Arch Linux / Wayland
# ──────────────────────────────────────────────

$mod = SUPER
$alt = ALT
$terminal = ghostty
$menu = rofi -show drun -show-icons
$browser = zen-browser
$filemanager = pcmanfm-qt

# ──────────────────────────────────────────────
# Autostart
# ──────────────────────────────────────────────

exec-once = waybar
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ──────────────────────────────────────────────
# Monitor - single laptop display
# ──────────────────────────────────────────────

monitor = , preferred, auto, 1

# ──────────────────────────────────────────────
# Environment
# ──────────────────────────────────────────────

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# ──────────────────────────────────────────────
# Input
# ──────────────────────────────────────────────

input {
    kb_layout = us,ara,de
    kb_options = grp:alt_shift_toggle

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}

# ──────────────────────────────────────────────
# General
# ──────────────────────────────────────────────

general {
    gaps_in = 2
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(ffffffaa)
    col.inactive_border = rgba(ffffff33)
    layout = dwindle
    allow_tearing = false
}

# ──────────────────────────────────────────────
# Decoration
# ──────────────────────────────────────────────

decoration {
    rounding = 0

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = false
    }
}

# ──────────────────────────────────────────────
# Animations
# ──────────────────────────────────────────────

animations {
    enabled = true
    bezier = snappy, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 3, snappy
    animation = windowsOut, 1, 3, snappy, popin 80%
    animation = fade, 1, 3, snappy
    animation = workspaces, 1, 3, snappy, slide
}

# ──────────────────────────────────────────────
# Layout
# ──────────────────────────────────────────────

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# ──────────────────────────────────────────────
# Misc
# ──────────────────────────────────────────────

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ──────────────────────────────────────────────
# Window Rules
# ──────────────────────────────────────────────

windowrule = bordercolor rgba(ffffffaa), floating:0
windowrule = bordercolor rgba(ffffff55), floating:1
windowrule = float, class:^(floating_shell)$
windowrule = size 80% 80%, class:^(floating_shell)$
windowrule = center, class:^(floating_shell)$
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, title:^(Open File)$
windowrule = float, title:^(Save File)$

# ──────────────────────────────────────────────
# Keybindings - General
# ──────────────────────────────────────────────

bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod CONTROL, space, togglefloating
bind = $mod, T, togglesplit
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, Q, exit

# ──────────────────────────────────────────────
# Keybindings - Launch
# ──────────────────────────────────────────────

bind = $mod, RETURN, exec, $terminal
bind = $mod, SPACE, exec, ~/.local/bin/hyprland-cwd-terminal
bind = $mod, D, exec, $menu
bind = $mod, W, exec, $browser
bind = $mod, E, exec, $filemanager
bind = $mod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy
bind = $mod, X, exec, ~/.config/rofi/powermenu.sh
bind = $mod, L, exec, hyprlock

# ──────────────────────────────────────────────
# Keybindings - Screenshot (hyprshot)
# ──────────────────────────────────────────────

bind = , Print, exec, hyprshot -m output
bind = $mod SHIFT, S, exec, hyprshot -m region
bind = $mod, Print, exec, hyprshot -m window

# ──────────────────────────────────────────────
# Keybindings - Focus (vim-style)
# ──────────────────────────────────────────────

bind = $alt, H, movefocus, l
bind = $alt, J, movefocus, d
bind = $alt, K, movefocus, u
bind = $alt, L, movefocus, r

# ──────────────────────────────────────────────
# Keybindings - Move windows
# ──────────────────────────────────────────────

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# ──────────────────────────────────────────────
# Keybindings - Resize (submap)
# ──────────────────────────────────────────────

bind = $mod, R, submap, resize
submap = resize
bind = , H, resizeactive, -20 0
bind = , J, resizeactive, 0 20
bind = , K, resizeactive, 0 -20
bind = , L, resizeactive, 20 0
bind = , RETURN, submap, reset
bind = , ESCAPE, submap, reset
submap = reset

# ──────────────────────────────────────────────
# Keybindings - Workspaces
# ──────────────────────────────────────────────

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Scratchpad
bind = $mod, N, movetoworkspace, special
bind = $mod SHIFT, N, togglespecialworkspace

# Mouse workspace scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Mouse move/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ──────────────────────────────────────────────
# Keybindings - Brightness
# ──────────────────────────────────────────────

bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ──────────────────────────────────────────────
# Keybindings - Volume
# ──────────────────────────────────────────────

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ──────────────────────────────────────────────
# Keybindings - Keyboard Layout
# ──────────────────────────────────────────────

bind = $mod, 0, exec, hyprctl switchxkblayout all 0
bind = $mod, 9, exec, hyprctl switchxkblayout all 1
bind = $mod, 8, exec, hyprctl switchxkblayout all 2

# ──────────────────────────────────────────────
# Keybindings - Waybar toggle
# ──────────────────────────────────────────────

bind = $mod, B, exec, killall -SIGUSR1 waybar
