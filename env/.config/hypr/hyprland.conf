# ──────────────────────────────────────────────
# Hyprland Config - Arch Linux / Wayland
# ──────────────────────────────────────────────

$mod = SUPER
$alt = ALT
$terminal = ghostty
$menu = rofi -show drun -show-icons
$browser = zen-browser
$filemanager = thunar

# ──────────────────────────────────────────────
# Autostart
# ──────────────────────────────────────────────

exec-once = waybar
exec-once = awww-daemon
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ──────────────────────────────────────────────
# Monitor - single laptop display
# ──────────────────────────────────────────────

monitor = , preferred, auto, 1

# workspace = special, persistent:true, monitordefault

# ──────────────────────────────────────────────
# Environment
# ──────────────────────────────────────────────

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ──────────────────────────────────────────────
# Input
# ──────────────────────────────────────────────

input {
  kb_layout = us,ara,de
  kb_options = grp:alt_shift_toggle

  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = true
    tap-to-click = true
    drag_lock = true
  }
}

# ──────────────────────────────────────────────
# General
# ──────────────────────────────────────────────

general {
  gaps_in = 2
  gaps_out = 0
  border_size = 2
  col.active_border = rgba(ffffffaa)
  col.inactive_border = rgba(ffffff33)
  layout = dwindle
  allow_tearing = false
}

# ──────────────────────────────────────────────
# Input
# ──────────────────────────────────────────────

input {
  float_switch_override_focus = 1
}

# ──────────────────────────────────────────────
# Decoration
# ──────────────────────────────────────────────

decoration {
  rounding = 10

  blur {
      enabled = true
      size = 8
      passes = 3
      new_optimizations = true
      xray = false
      ignore_opacity = true
  }

  shadow {
      enabled = false
      range = 30
      offset = 0 0
      color = rgb(000370)
  }

  dim_inactive = false
  dim_strength = 0.05
  active_opacity = 0.95
  inactive_opacity = 0.90
  fullscreen_opacity = 0.0
}

# ──────────────────────────────────────────────
# Animations
# ──────────────────────────────────────────────

animations {
  enabled = true
  bezier = snappy, 0.05, 0.9, 0.1, 1.0
  bezier = neon, 0.19, 1.0, 0.22, 1.0
  bezier = bounce, 0.05, 0.9, 0.1, 1.1
  animation = windows, 1, 4, snappy
  animation = windowsIn, 1, 4, snappy
  animation = windowsOut, 1, 4, snappy
  animation = windowsMove, 1, 4, snappy
  animation = workspaces, 1, 4, snappy, slide
  animation = border, 1, 5, neon
  animation = borderangle, 1, 5, neon
}

# ──────────────────────────────────────────────
# Layout
# ──────────────────────────────────────────────

dwindle {
  pseudotile = true
  preserve_split = true
  force_split = 2
}

# ──────────────────────────────────────────────
# Misc
# ──────────────────────────────────────────────

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  disable_splash_rendering = true
}

# ──────────────────────────────────────────────
# Window Rules (v0.53+ Unified Syntax)
# ──────────────────────────────────────────────

# Enable alpha transparency for supporting apps
windowrule = opacity 0.9 0.9, match:class com.mitchellh.ghostty

# Selectors now use 'match:' and rules require explicit values (e.g., float 1)
windowrule = match:float 0, border_color rgba(ffffffaa)
windowrule = match:float 1, border_color rgba(ffffff55)

# Default floating window size (80% of monitor)
windowrule = match:float 1, size 1540 864

# Ghostty Scratchpad (comma-separated matches)
windowrule = match:class ^(com\.mitchellh\.ghostty)$, match:title ^(ghostty_scratchpad)$, float 1
windowrule = match:class ^(com\.mitchellh\.ghostty)$, match:title ^(ghostty_scratchpad)$, size 1540 864
windowrule = match:class ^(com\.mitchellh\.ghostty)$, match:title ^(ghostty_scratchpad)$, center 1
windowrule = match:class ^(com\.mitchellh\.ghostty)$, match:title ^(ghostty_scratchpad)$, workspace special silent

# Common floating utilities
windowrule = match:class ^(pavucontrol)$, float 1
windowrule = match:class ^(nm-connection-editor)$, float 1
windowrule = match:title ^(Open File)$, float 1
windowrule = match:title ^(Save File)$, float 1

# ──────────────────────────────────────────────
# Keybindings - General
# ──────────────────────────────────────────────

bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod CONTROL, space, togglefloating
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, Q, exit

# ──────────────────────────────────────────────
# Keybindings - Launch
# ──────────────────────────────────────────────

bind = $mod, RETURN, exec, $terminal
bind = $mod, SPACE, exec, ~/.local/bin/hyprland-cwd-terminal
bind = $mod, D, exec, $menu
bind = $mod, W, exec, $browser
bind = $mod, E, exec, $filemanager
bind = $mod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy
bind = $mod, X, exec, ~/.config/rofi/powermenu.sh
bind = $mod SHIFT, L, exec, hyprlock

# ──────────────────────────────────────────────
# Keybindings - Screenshot (hyprshot)
# ──────────────────────────────────────────────

bind = , Print, exec, hyprshot -m output
bind = $mod SHIFT, S, exec, hyprshot -m region
bind = $mod, Print, exec, hyprshot -m window

# ──────────────────────────────────────────────
# Keybindings - Focus (vim-style)
# ──────────────────────────────────────────────

bind = $alt, H, movefocus, l
bind = $alt, J, movefocus, d
bind = $alt, K, movefocus, u
bind = $alt, L, movefocus, r

# ──────────────────────────────────────────────
# Keybindings - Move windows
# ──────────────────────────────────────────────

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# ──────────────────────────────────────────────
# Keybindings - Resize (submap)
# ──────────────────────────────────────────────

bind = $mod, R, submap, resize
submap = resize
bind = , H, resizeactive, -20 0
bind = , J, resizeactive, 0 20
bind = , K, resizeactive, 0 -20
bind = , L, resizeactive, 20 0
bind = , RETURN, submap, reset
bind = , ESCAPE, submap, reset
submap = reset

# ──────────────────────────────────────────────
# Keybindings - Workspaces
# ──────────────────────────────────────────────

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Scratchpad
# bind = $mod, N, movetoworkspace, special
# bind = $mod SHIFT, N, togglespecialworkspace

# Mouse workspace scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Mouse move/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ──────────────────────────────────────────────
# Keybindings - Wallpaper (mod+6/7)
# ──────────────────────────────────────────────

bind = $mod, 6, exec, ~/.local/bin/wallpaper-cycle next
bind = $mod, 7, exec, ~/.local/bin/wallpaper-cycle prev

# ──────────────────────────────────────────────
# Keybindings - Brightness
# ──────────────────────────────────────────────

bindel = , XF86MonBrightnessUp, exec, echo $(($(cat /sys/class/backlight/nvidia_wmi_ec_backlight/brightness) + 40)) | sudo tee /sys/class/backlight/nvidia_wmi_ec_backlight/brightness
bindel = , XF86MonBrightnessDown, exec, echo $(($(cat /sys/class/backlight/nvidia_wmi_ec_backlight/brightness) - 40)) | sudo tee /sys/class/backlight/nvidia_wmi_ec_backlight/brightness

# ──────────────────────────────────────────────
# Keybindings - Volume
# ──────────────────────────────────────────────

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ──────────────────────────────────────────────
# Keybindings - Keyboard Layout
# ──────────────────────────────────────────────

bind = $mod, 0, exec, hyprctl switchxkblayout all 0
bind = $mod, 9, exec, hyprctl switchxkblayout all 1
bind = $mod, 8, exec, hyprctl switchxkblayout all 2

# ──────────────────────────────────────────────
# Keybindings - Waybar toggle
# ──────────────────────────────────────────────

bind = $mod, B, exec, killall -SIGUSR1 waybar
