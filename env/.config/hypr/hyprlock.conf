# ──────────────────────────────────────────────
# Hyprlock Config
# ──────────────────────────────────────────────

general {
    hide_cursor = true
    grace = 3
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    brightness = 0.5
}

# Clock
label {
    monitor =
    text = $TIME
    font_size = 96
    font_family = Fira Code
    color = rgba(255, 255, 255, 0.9)
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    font_size = 20
    font_family = Fira Code
    color = rgba(255, 255, 255, 0.7)
    position = 0, 120
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff99">Password...</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
