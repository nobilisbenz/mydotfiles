[bar/main]
enable-ipc = true
monitor = DP-4
width = 100%
height = 14
background = #000000
foreground = #ffffff
font-0 = "Fira Code iScript:size=8;2"
font-1 = "FontAwesome:size=10;2"
font-2 = "Font Awesome 6 Free:size=10;2"
font-3 = "Font Awesome 6 Free Solid:size=10;2"
font-4 = "Font Awesome 6 Brands:size=10;2"

modules-left = i3
modules-right = xkeyboard memory cpu gpu battery tray date
padding-left = 15pt
padding-right = 15pt
module-margin = 2

[module/i3]
type = internal/i3
format = <label-state>
label-focused = %name%
label-focused-background = #333333
label-focused-padding = 1
label-unfocused = %name%
label-unfocused-padding = 1

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 99
format-charging = AC: <label-charging>
label-charging = %percentage%%
format-discharging = <label-discharging>
label-discharging = %percentage%%
label-discharging-foreground = #ffaa00

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU: "
format-prefix-foreground = #ffffff
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM: "
format-prefix-foreground = #ffffff
label = %percentage_used%%

[module/gpu]
type = custom/script
exec = nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits | awk '{print $1"%"}'
interval = 5
format-prefix = "GPU: "

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%

[module/tray]
type = internal/tray
tray-padding = 2
tray-size = 14

[module/date]
type = internal/date
date = %H:%M
