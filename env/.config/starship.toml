# Don't print a new line at the start of the prompt
add_newline = false

# Order: Arrow -> Folder -> Git Info -> Status
format = """$character$directory$git_branch$git_status"""

[line_break]
disabled = true

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
style = "bold cyan"
truncation_length = 1
truncation_symbol = ""
repo_root_style = "bold cyan"
format = "[$path]($style) " 

[git_branch]
symbol = "" 
style = "bold red"
# Literal blue wrapper for the red branch name
format = '[git:\(](bold blue)[$branch]($style)[\) ](bold blue)'

[git_status]
style = "bold yellow" # Keep the status yellow as seen in your screenshots
# This format ensures they appear tightly packed without extra spaces
#format = '([$all_status$ahead_behind]($style) )'
format = '([$status]($style) )'

# VISUAL VALUES: Distinct but minimal
# ----------------------------------
# up_to_date = ""
# conflicted = "=" # Traditional "equals" for conflict
# ahead = "⇡"      # Clean arrow for commits to push
# behind = "⇣"     # Clean arrow for commits to pull
# diverged = "⇕"   # Indicates both ahead and behind
# untracked = "?"   # Standard symbol for new files
# modified = "!"    # Standard symbol for changes
# staged = "+"      # Standard symbol for added to index
# deleted = "✘"      # Clear mark for removed files
# renamed = "»"      # Symbol for moved files
